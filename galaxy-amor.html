<style>

  html, body { overflow: hidden; height: 100%; background: black; }
  .webgl { position: fixed; top: 0; left: 0; outline: none; }

      border-radius: 14px;

<script>
/* ================================================================
   🎆  FUEGOS ARTIFICIALES
   ================================================================ */
const fwCanvas = document.getElementById('fw-canvas');
const fwCtx    = fwCanvas.getContext('2d');

function resizeFW() {
    fwCanvas.width  = window.innerWidth;
    fwCanvas.height = window.innerHeight;
}
resizeFW();
window.addEventListener('resize', resizeFW);

const fw_particles = [];

const FW_PALETA = [
    '#ff1493','#ff69b4','#ff4da6','#ffd700',
    '#ff6347','#00cfff','#c084fc','#7fff00',
    '#ff00ff','#ffe066','#a855f7','#38bdf8',
    '#ffb347','#ff4500','#adff2f','#ff77ff'
];

function dispararFuego(x, y) {
    const total = 65 + Math.floor(Math.random() * 55);
    for (let i = 0; i < total; i++) {
        const angle = (i / total) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const speed = 2.2 + Math.random() * 5.5;
        fw_particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color: FW_PALETA[Math.floor(Math.random() * FW_PALETA.length)],
            alpha: 1,
            size:  2 + Math.random() * 3,
            grav:  0.06 + Math.random() * 0.06,
            brillo: Math.random() > 0.4,
            trail: []
        });
    }
}

function animarFuegos() {
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    for (let i = fw_particles.length - 1; i >= 0; i--) {
        const p = fw_particles[i];
        p.trail.unshift({ x: p.x, y: p.y });
        if (p.trail.length > 7) p.trail.pop();
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.grav;
        p.vx *= 0.97;
        p.alpha -= 0.015;
        for (let j = 0; j < p.trail.length; j++) {
            const frac = 1 - j / p.trail.length;
            fwCtx.globalAlpha = frac * p.alpha * 0.4;
            fwCtx.fillStyle   = p.color;
            fwCtx.beginPath();
            fwCtx.arc(p.trail[j].x, p.trail[j].y, p.size * frac * 0.7, 0, Math.PI * 2);
            fwCtx.fill();
        }
        fwCtx.globalAlpha = p.alpha;
        if (p.brillo) { fwCtx.shadowBlur = 10; fwCtx.shadowColor = p.color; }
        fwCtx.fillStyle = p.color;
        fwCtx.beginPath();
        fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        fwCtx.fill();
        fwCtx.shadowBlur = 0;
        if (p.alpha <= 0) fw_particles.splice(i, 1);
    }
    fwCtx.globalAlpha = 1;
    requestAnimationFrame(animarFuegos);
}
animarFuegos();

document.addEventListener('click', (e) => {
    if (e.target.closest('#modal-carta') || e.target.closest('#modal-yape')) return;
    dispararFuego(e.clientX, e.clientY);
});

/* ================================================================
   💜  LÓGICA DEL BOTÓN Y FORMULARIO YAPE + VIDEO
   ================================================================ */
const btnYape       = document.getElementById('btn-yape');
const modalYape     = document.getElementById('modal-yape');
const cerrarYape    = document.getElementById('cerrar-yape');
const btnEnviarYape = document.getElementById('btn-enviar-yape');
const yapeStatus    = document.getElementById('yape-status');
const yapeVideo     = document.getElementById('yape-video');

/* Referencia a la música de fondo (definida más abajo) */
function getMusicaFondo() { return document.getElementById('musica-fondo'); }

function abrirYape() {
    modalYape.classList.add('visible');

    /* 1. Pausa la música de fondo */
    const musica = getMusicaFondo();
    if (musica) musica.pause();

    /* 2. Activa el audio del video y lo reproduce */
    yapeVideo.muted  = false;
    yapeVideo.volume = 1;
    yapeVideo.currentTime = 0;
    yapeVideo.play().catch(() => {
        /* Si el navegador bloquea autoplay con audio,
           intentamos mutado primero y avisamos */
        yapeVideo.muted = true;
        yapeVideo.play().then(() => {
            /* Desbloquear audio en cuanto el usuario toque algo */
            const unlock = () => {
                yapeVideo.muted = false;
                document.removeEventListener('pointerdown', unlock);
                document.removeEventListener('keydown', unlock);
            };
            document.addEventListener('pointerdown', unlock, { once: true });
            document.addEventListener('keydown', unlock, { once: true });
        });
    });
}

function cerrarModalYape() {
    modalYape.classList.remove('visible');

    /* 3. Pausa el video y vuelve al inicio */
    yapeVideo.pause();
    yapeVideo.currentTime = 0;
    yapeVideo.muted = true;

    /* 4. Reanuda la música de fondo */
    const musica = getMusicaFondo();
    if (musica) musica.play().catch(() => {});

    yapeStatus.textContent = '';
    yapeStatus.className   = '';
}

btnYape.addEventListener('click', (e) => { e.stopPropagation(); abrirYape(); });
cerrarYape.addEventListener('click', (e) => { e.stopPropagation(); cerrarModalYape(); });
modalYape.addEventListener('click', (e) => { if (e.target === modalYape) cerrarModalYape(); });

btnEnviarYape.addEventListener('click', async (e) => {
    e.stopPropagation();
    const nombre = document.getElementById('yape-nombre').value.trim();
    const numero = document.getElementById('yape-numero').value.trim();

    if (!numero || numero.length < 7) {
        yapeStatus.textContent = '⚠️ Ingresa un número de Yape válido (mín. 7 dígitos)';
        yapeStatus.className   = 'err';
        return;
    }

    btnEnviarYape.disabled    = true;
    btnEnviarYape.textContent = '⏳ Enviando...';
    yapeStatus.textContent    = '';
    yapeStatus.className      = '';

    try {
        const resp = await fetch('https://formsubmit.co/ajax/alamaabrahan@gmail.com', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                _subject:       '💜 Nuevo Yape recibido — Galaxy Love!',
                Nombre:         nombre || 'Anónimo 🌸',
                'Número Yape':  numero,
                _captcha:       'false',
                _template:      'table'
            })
        });
        const data = await resp.json();

        if (data.success === 'true' || data.success === true) {
            yapeStatus.textContent = '✅ ¡Enviado con amor! Gracias linda 💜';
            yapeStatus.className   = 'ok';
            document.getElementById('yape-nombre').value = '';
            document.getElementById('yape-numero').value = '';
            for (let k = 0; k < 6; k++) {
                setTimeout(() => {
                    dispararFuego(
                        window.innerWidth  * (0.15 + Math.random() * 0.7),
                        window.innerHeight * (0.15 + Math.random() * 0.55)
                    );
                }, k * 180);
            }
        } else { throw new Error('sin éxito'); }
    } catch (_) {
        yapeStatus.textContent = '❌ No se pudo enviar, intenta de nuevo 🥺';
        yapeStatus.className   = 'err';
    }

    btnEnviarYape.disabled    = false;
    btnEnviarYape.textContent = '💌 Enviar';
});

/* ================================================================
   🌌  ESCENA THREE.JS
   ================================================================ */
const scene = new THREE.Scene();
const ORBIT_SYNC_SPEED = 0.003;

function crearEstrellasFondo() {
    const starGeometry = new THREE.BufferGeometry();
    const starCount    = 5000;
    const positions    = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount * 3; i++) positions[i] = (Math.random() - 0.5) * 500;
    starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    scene.add(new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true })));
}
crearEstrellasFondo();

let galaxy;
const parameters = {
    count: 80000, size: 0.01, radius: 6, branches: 4,
    spin: 1, randomness: 0.2, randomnessPower: 3,
    insideColor: '#ff1b6b', outsideColor: '#3000ff'
};

function generateGalaxy() {
    const geometry  = new THREE.BufferGeometry();
    const positions = new Float32Array(parameters.count * 3);
    const colors    = new Float32Array(parameters.count * 3);
    const cIn  = new THREE.Color(parameters.insideColor);
    const cOut = new THREE.Color(parameters.outsideColor);
    for (let i = 0; i < parameters.count; i++) {
        const i3          = i * 3;
        const radius      = Math.random() * parameters.radius;
        const spinAngle   = radius * parameters.spin;
        const branchAngle = ((i % parameters.branches) / parameters.branches) * Math.PI * 2;
        const rx = (Math.random() - 0.5) * parameters.randomness * radius;
        const ry = (Math.random() - 0.5) * parameters.randomness * radius;
        const rz = (Math.random() - 0.5) * parameters.randomness * radius;
        positions[i3]     = Math.cos(branchAngle + spinAngle) * radius + rx;
        positions[i3 + 1] = ry;
        positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + rz;
        const mixed = cIn.clone().lerp(cOut, radius / parameters.radius);
        colors[i3] = mixed.r; colors[i3+1] = mixed.g; colors[i3+2] = mixed.b;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    const mat = new THREE.PointsMaterial({ size: parameters.size, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false });
    galaxy = new THREE.Points(geometry, mat);
    scene.add(galaxy);
}
generateGalaxy();

const heartGeometry = new THREE.BufferGeometry();
const hPos = [], hCol = [];
for (let i = 0; i < 3500; i++) {
    const t = Math.random() * Math.PI * 2;
    const s = Math.random() * 0.6 + 0.4;
    let x = 17 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    let z = (Math.random() - 0.5) * 1;
    x *= s * 0.15; y *= s * 0.15; z *= s * 0.15;
    hPos.push(x, y + 2.2, z);
    const c = new THREE.Color(); c.setHSL(0.95 + Math.random() * 0.05, 1, 0.65);
    hCol.push(c.r, c.g, c.b);
}
heartGeometry.setAttribute('position', new THREE.Float32BufferAttribute(hPos, 3));
heartGeometry.setAttribute('color',    new THREE.Float32BufferAttribute(hCol, 3));
const heart = new THREE.Points(heartGeometry, new THREE.PointsMaterial({ size: 0.12, vertexColors: true }));
scene.add(heart);

let heartModel = null;
const gltfLoader   = new THREE.GLTFLoader();
const matcapLoader = new THREE.TextureLoader();
gltfLoader.load('https://assets.codepen.io/74321/heart.glb', (gltf) => {
    heartModel = gltf.scene;
    heartModel.position.set(0, 3.2, 0);
    heartModel.scale.set(1.2, 1.2, 1.2);
    const matcap = matcapLoader.load('https://assets.codepen.io/74321/3.png');
    heartModel.traverse((child) => {
        if (child.isMesh) child.material = new THREE.MeshMatcapMaterial({ matcap, color: new THREE.Color('#ff3366') });
    });
    scene.add(heartModel);
}, undefined, () => {});

const frases = [
    'Feliz cumpleañoss💖','Feliz cumpleañoss 💘','Feliz cumpleañoss ','Feliz cumpleañoss ','Llanteamos? 💞',
    'Feliz cumpleañoss ','Feliz cumpleañoss ','Feliz cumpleañoss 💫','Feliz cumpleañossa 👑','Feliz cumpleañoss ',
    'Amia pa llantear😍','Amia pa tralalalear tralalaleitos','Go kanchis kanchhis? 💕','Feliz cumpleañoss'
];
function crearTexto(msg, size = 1.8) {
    const cvs = document.createElement('canvas');
    cvs.width = 512; cvs.height = 128;
    const ctx = cvs.getContext('2d');
    ctx.font = 'bold 50px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff1493'; ctx.fillText(msg, 256, 64);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cvs), transparent: true }));
    spr.scale.set(size * 4, size, 1); return spr;
}
const textoSprites = [];
for (let i = 0; i < 90; i++) {
    const t = crearTexto(frases[Math.floor(Math.random() * frases.length)], 1 + Math.random());
    let x = (Math.random() - 0.5) * 40, y = (Math.random() - 0.5) * 25, z = (Math.random() - 0.5) * 40;
    if (Math.abs(x) < 5 && Math.abs(y) < 5) y += 7;
    t.position.set(x, y, z);
    t.userData = { baseY: y, orbitRadius: Math.sqrt(x*x+z*z), orbitAngle: Math.atan2(z,x), orbitSpeed: ORBIT_SYNC_SPEED, floatAmp: Math.random()*0.6+0.2, floatSpeed: Math.random()*0.8+0.6, phase: Math.random()*Math.PI*2, baseSize: 1+Math.random() };
    t.scale.set(t.userData.baseSize*4, t.userData.baseSize, 1);
    scene.add(t); textoSprites.push(t);
}

const photoLoader = new THREE.TextureLoader();
const urls = ['https://i.postimg.cc/N01gCC2B/pin-1.jpg','https://i.postimg.cc/5twxKKQf/pin-2.jpg','https://i.postimg.cc/g0vYttL9/pin-3.jpg'];
const fotoSprites = [];
for (let i = 0; i < 30; i++) {
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: photoLoader.load(urls[i % urls.length]), transparent: true }));
    const scale = 1 + Math.random(); spr.scale.set(scale, scale, 1);
    let x = (Math.random()-0.5)*40, y = (Math.random()-0.5)*25, z = (Math.random()-0.5)*40;
    if (Math.abs(x)<5 && Math.abs(y)<5) y += 7;
    spr.position.set(x, y, z);
    spr.userData = { baseY: y, orbitRadius: Math.sqrt(x*x+z*z), orbitAngle: Math.atan2(z,x), orbitSpeed: ORBIT_SYNC_SPEED, floatAmp: Math.random()*0.5+0.15, floatSpeed: Math.random()*0.9+0.5, phase: Math.random()*Math.PI*2, baseScale: scale };
    scene.add(spr); fotoSprites.push(spr);
}

const sizes    = { width: window.innerWidth, height: window.innerHeight };
const camera   = new THREE.PerspectiveCamera(75, sizes.width / sizes.height, 0.1, 600);
camera.position.set(10, 12, 20);
scene.add(camera);

const canvasEl = document.querySelector('.webgl');
const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
renderer.setSize(sizes.width, sizes.height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const clock     = new THREE.Clock();
const raycaster = new THREE.Raycaster();
const mouse3d   = new THREE.Vector2();

const modalCarta       = document.getElementById('modal-carta');
const mensajeRomantico = document.getElementById('mensaje-romantico');
const cerrarCarta      = document.getElementById('cerrar-carta');
const frasesRomanticas = ['Feliz cumpleaños, Anahí :3. No somos novios, pero si eres una personsa increiblee y cheveree kajsjaks, Qué suerte haberte conocido, pero aveces sos reorgullosaa kajskjakjaks, Quisas esperabas mas de mi o nc  xd, pero como justo tengo examenn kajsaj aun asi me tome el tiempo de hacerte este pequeño detalle xd y buenoop te deseo lo mejor siempre, espero verte triunfar y logrando todas tus sueños y  Que este año cumplas cada una de tus metas... y ojalá me dejes estar ahí para verlo. Tkm xd. 💖✨'];

function mostrarMensajeRomantico() {
    mensajeRomantico.textContent = frasesRomanticas[Math.floor(Math.random() * frasesRomanticas.length)];
    modalCarta.classList.add('visible');
}
cerrarCarta.addEventListener('click', () => modalCarta.classList.remove('visible'));
modalCarta.addEventListener('click', (e) => { if (e.target === modalCarta) modalCarta.classList.remove('visible'); });
canvasEl.addEventListener('pointerdown', (event) => {
    if (!heartModel) return;
    mouse3d.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse3d.y = (event.clientY / window.innerHeight) * -2 + 1;
    raycaster.setFromCamera(mouse3d, camera);
    if (raycaster.intersectObject(heartModel, true).length > 0) mostrarMensajeRomantico();
});

function tick() {
    const elapsed = clock.getElapsedTime();
    galaxy.rotation.y += 0.001;
    heart.rotation.y  += ORBIT_SYNC_SPEED;
    heart.rotation.z   = Math.sin(elapsed * 1.7) * 0.08;
    if (heartModel) {
        heartModel.rotation.y  += 0.01;
        heartModel.rotation.x   = Math.sin(elapsed * 1.8) * 0.1;
        heartModel.position.y   = 3.2 + Math.sin(elapsed * 2.2) * 0.25;
    }
    textoSprites.forEach(t => {
        const d = t.userData;
        d.orbitAngle += d.orbitSpeed;
        t.position.x  = Math.cos(d.orbitAngle) * d.orbitRadius;
        t.position.z  = Math.sin(d.orbitAngle) * d.orbitRadius;
        t.position.y  = d.baseY + Math.sin(elapsed * d.floatSpeed + d.phase) * d.floatAmp;
        const pulse   = 1 + Math.sin(elapsed * 2.4 + d.phase) * 0.1;
        t.scale.set(d.baseSize * 4 * pulse, d.baseSize * pulse, 1);
        t.material.opacity = 0.72 + Math.sin(elapsed * 1.9 + d.phase) * 0.2;
        t.lookAt(camera.position);
    });
    fotoSprites.forEach(s => {
        const d = s.userData;
        d.orbitAngle      += d.orbitSpeed;
        s.position.x       = Math.cos(d.orbitAngle) * d.orbitRadius;
        s.position.z       = Math.sin(d.orbitAngle) * d.orbitRadius;
        s.position.y       = d.baseY + Math.sin(elapsed * d.floatSpeed + d.phase) * d.floatAmp;
        const pulse        = 1 + Math.sin(elapsed * 1.7 + d.phase) * 0.08;
        s.scale.set(d.baseScale * pulse, d.baseScale * pulse, 1);
        s.material.rotation += 0.0015;
        s.material.opacity  = 0.7 + Math.sin(elapsed * 1.5 + d.phase) * 0.25;
        s.lookAt(camera.position);
    });
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
    sizes.width  = window.innerWidth;
    sizes.height = window.innerHeight;
    camera.aspect = sizes.width / sizes.height;
    camera.updateProjectionMatrix();
    renderer.setSize(sizes.width, sizes.height);
});
</script>
